name: Android Build Final

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # Cache wurde entfernt, um den Fehler zu umgehen

      - name: Check files (Debug)
        run: ls -R # Dies zeigt uns in den Logs, wo deine Dateien wirklich sind

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || echo "gradlew not found"

      - name: Build with Gradle
        run: ./gradlew assembleDebug || echo "Gradle build failed - check paths"
