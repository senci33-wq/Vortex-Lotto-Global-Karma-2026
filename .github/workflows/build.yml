name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          libffi-dev \
          libssl-dev \
          liblzma-dev \
          zlib1g-dev \
          libncurses5

    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    - name: Install Android SDK + NDK
      run: |
        sudo mkdir -p /usr/lib/android-sdk
        sudo chown $USER:$USER /usr/lib/android-sdk
        yes | sdkmanager --sdk_root=/usr/lib/android-sdk "platform-tools" "platforms;android-31" "build-tools;31.0.0" "ndk;21.3.6528147"

    - name: Set environment variables
      run: |
        echo "ANDROIDSDK=/usr/lib/android-sdk" >> $GITHUB_ENV
        echo "ANDROIDNDK=/usr/lib/android-sdk/ndk/21.3.6528147" >> $GITHUB_ENV
        echo "ANDROIDAPI=31" >> $GITHUB_ENV
        echo "ANDROIDMINAPI=21" >> $GITHUB_ENV

    - name: Build APK
      run: |
        buildozer android debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: Vortex-Lotto-Global-Karma-APK
        path: bin/*.apk
