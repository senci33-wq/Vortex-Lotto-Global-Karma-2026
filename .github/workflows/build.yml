name: Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip build-essential git python3 python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev
          sudo apt-get install -y libgstreamer1.0-gstreamer-lite-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good
          pip install --user --upgrade buildozer cython virtualenv

      - name: Build with Buildozer
        run: buildozer android release

      - name: Sign and Package AAB
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_CONTENT }}" | base64 -d > release.jks
          # Hier fehlen noch die eigentlichen Befehle zum Signieren (jarsigner)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-play-bundle
          path: bin/*.aab
