name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: System-Abhängigkeiten
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses6 libncursesw6 cmake libffi-dev libssl-dev libsqlite3-dev
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Buildozer Spec Auto-Fix
        run: |
          # Wir löschen den Cache komplett für einen sauberen Start
          rm -rf .buildozer/
          sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/android.api = .*/android.api = 34/' buildozer.spec
          sed -i 's/android.sdk_build_tools_revision = .*/android.sdk_build_tools_revision = 34.0.0/' buildozer.spec
          sed -i 's/requirements = .*/requirements = python3, kivy==2.3.0, requests, urllib3, chardet, idna, certifi/' buildozer.spec

      - name: Build mit Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Wir setzen das Log-Level auf 2, damit wir GENAU sehen, was schiefläuft
          yes | buildozer -v android debug log_level=2

      - name: APK hochladen (auch bei Fehlern)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Vortex-Lotto-Log-oder-APK
          path: |
            bin/*.apk
            .buildozer/android/platform/build-*/build/libs/
