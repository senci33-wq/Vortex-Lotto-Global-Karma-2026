name: Android Play Store Build (AAB)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies (Aidl Fix)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git python3-dev aidl \
            libffi-dev libssl-dev autoconf automake \
            libtool pkg-config zlib1g-dev

      - name: Build with Buildozer
        uses: ArtemSerebrennikov/buildozer-action@v1
        with:
          # Wir bauen jetzt "release" für den Play Store
          command: buildozer android release
          buildozer_version: master

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vortex-Lotto-PlayStore-Bundle
          # Der Pfad für AABs ist ebenfalls im bin/ Ordner
          path: bin/*.aab
