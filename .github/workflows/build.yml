name: Google Play Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04 # Stabilere Version für Buildozer

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Buildozer braucht viele Pakete, diese Action installiert alles korrekt
      - name: Build with Buildozer
        uses: ArtemSerebrennikov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android release
          buildozer_version: master

      # Das fertige Bundle (.aab) für Google Play speichern
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Google-Play-Bundle
          path: bin/*.aab
