name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Repair and Install Dependencies
        run: |
          # Werkbank aufräumen
          sudo apt clean
          sudo dpkg --configure -a
          
          # Werkzeuge installieren
          sudo apt update --fix-missing
          sudo apt install -y build-essential git ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good
          
          # Python-Werkzeuge installieren
           pip install --upgrade pip
          pip install Cython==0.29.33 buildozer

      - name: Lizenzen akzeptieren
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          yes | sdkmanager --licenses || true
      - name: Build with Buildozer
        run: |
          buildozer -v android debug

      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
      -name: Vortex-App
      path: bin/*.apk
