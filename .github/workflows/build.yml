name: System-Check & Diagnose

on:
  push:
    branches: [ main ]

jobs:
  diagnose:
    runs-on: ubuntu-22.04

    steps:
      - name: System-Check
        run: |
          echo "### BETRIEBSSYSTEM ###"
          lsb_release -a
          echo "---"
          echo "### PYTHON VERSION ###"
          python3 --version
          echo "---"
          echo "### SSL BIBLIOTHEKEN ###"
          ldconfig -p | grep ssl || echo "Kein SSL gefunden"
          ldconfig -p | grep crypto || echo "Kein Crypto gefunden"
          echo "---"
          echo "### VERFÜGBARE PAKETE TESTEN ###"
          sudo apt-get update
          apt-cache policy libncurses5-dev libncurses6 libssl-dev
          echo "---"
          echo "### DATEI-STRUKTUR ###"
          ls -R
