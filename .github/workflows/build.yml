name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: System-Abhängigkeiten (Der Aidl-Fix)
        run: |
          sudo apt update
          # WICHTIG: Die lib32-Pakete sind der Schlüssel für das Aidl-Problem!
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev \
          libncurses6 libncursesw6 cmake libffi-dev libssl-dev libsqlite3-dev gettext \
          libgdbm-dev libnss3-dev libreadline-dev libdb-dev libstdc++6 lib32stdc++6 lib32z1
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Buildozer Spec Force-Fix
        run: |
          # Alten Müll löschen
          rm -rf .buildozer/
          # API 31 ist wie ein gemütlicher VW Käfer: Läuft immer.
          sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/android.api = .*/android.api = 31/' buildozer.spec
          sed -i 's/android.minapi = .*/android.minapi = 21/' buildozer.spec
          sed -i 's/android.sdk_build_tools_revision = .*/android.sdk_build_tools_revision = 31.0.0/' buildozer.spec
          # Deine Lotto-App braucht diese Pakete
          sed -i 's/requirements = .*/requirements = python3, kivy==2.3.0, requests, urllib3, chardet, idna, certifi/' buildozer.spec

      - name: Build mit Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Wir lassen den Roboter von der Kette
          yes | buildozer -v android debug

      - name: APK hochladen
        if: always()
        uses: uploaded-artifact@v4
        with:
          name: Vortex-Lotto-APK-Paket
          path: bin/*.apk

