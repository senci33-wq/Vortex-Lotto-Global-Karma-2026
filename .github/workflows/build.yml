name: Build Vortex Ultra APK & AAB

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04 # Die stabilste Version für Buildozer

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo apt-get clean

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev libbz2-dev
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 kivy

      - name: Build APK (Debug)
        run: |
          unset ANDROID_HOME
          unset ANDROID_NDK_HOME
          yes | buildozer -v android debug
        env:
          BUILDOZER_ALLOW_ORG_NAME_START: 1

      - name: Build AAB (Release-Format)
        run: |
          # Wir schalten im Flug auf AAB um
          yes | buildozer android aab debug
        env:
          BUILDOZER_ALLOW_ORG_NAME_START: 1

      - name: Upload All Installers
        uses: actions/upload-artifact@v4
        with:
          name: Vortex-Ultra-Builds
          path: bin/
