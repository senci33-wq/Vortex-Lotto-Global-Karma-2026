name: Android Build Final

on:
  push:
    branches: [ "main" ] # Führt den Build bei jedem Push auf 'main' aus
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Quellcode auschecken
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Java JDK einrichten (Wichtig für Android!)
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Gradle-Ausführungsrechte setzen (Verhindert "Permission Denied")
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Der eigentliche Build-Prozess
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      # 5. Die fertige APK-Datei speichern, damit du sie herunterladen kannst
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
