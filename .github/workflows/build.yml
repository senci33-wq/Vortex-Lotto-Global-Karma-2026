name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-dev cmake libffi-dev libssl-dev zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libsqlite3-dev gawk texinfo libasound2-dev libsdl2-dev libncurses6 libncurses-dev libtinfo6
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libncurses.so.6 /usr/lib/x86_64-linux-gnu/libncurses.so.5
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libtinfo.so.6 /usr/lib/x86_64-linux-gnu/libtinfo.so.5
      - name: Install Python Build Tools
        run: |
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer kivy==2.3.0
      - name: Build with Buildozer
        run: |
          mkdir -p .buildozer
          yes | buildozer -v android debug
        env:
          BUILDOZER_ALLOW_ORG_NAME_START: 1
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vortex-Lotto-APK
          path: bin/*.apk
