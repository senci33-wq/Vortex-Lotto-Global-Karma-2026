name: Google Play Build Final

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Diese Action baut deine Python-App in ein Google Play Bundle (.aab) um
      - name: Build with Buildozer
        uses: ArtemSerebrennikov/buildozer-action@v1
        with:
          command: buildozer android release
          buildozer_version: master

      # Hier wird die fertige Datei für dich zum Download bereitgestellt
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Google-Play-Bundle
          path: bin/*.aab
