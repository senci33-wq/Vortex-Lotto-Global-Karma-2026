- name: Checkout source code
  uses: actions/checkout@v4

- name: Setup Python
  uses: actions/setup-python@v5
  with:
    python-version: '3.11'

- name: Setup Java 17
  uses: actions/setup-java@v4
  with:
    distribution: 'temurin'
    java-version: '17'

- name: Install System Dependencies
  run: |
    sudo apt-get update
    sudo apt-get install -y build-essential git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

- name: Install Buildozer and Cython
  run: |
    python -m pip install --upgrade pip
    pip install "Cython<3.0" virtualenv 
    pip install buildozer

- name: Build with Buildozer
  run: |
    rm -rf .buildozer
    buildozer android debug

- name: Upload Artifact
  uses: actions/upload-artifact@v4
  with:
    name: package
    path: bin/*.apk
