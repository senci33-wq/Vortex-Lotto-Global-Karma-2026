name: Build Vortex Ultra APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Erlaubt manuelles Starten

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev libbz2-dev
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 kivy

      - name: Build with Buildozer (The Fix)
        run: |
          # Wir erzwingen die Akzeptanz aller Lizenzen und nutzen den Silent-Mode
          yes | buildozer android debug
        env:
          # Verhindert Abbrüche bei bestimmten Namen oder Root-Warnungen
          BUILDOZER_ALLOW_ORG_NAME_START: 1
          BUILDOZER_WARN_ON_ROOT: 0

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vortex-Ultra-Debug-APK
          path: bin/*.apk
