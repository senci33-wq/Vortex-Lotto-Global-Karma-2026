name: Build for Google Play (Release)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Buildozer braucht viel Platz und Zeit
      - name: Build with Buildozer (Release AAB)
        uses: ArtemSerebrennikov/buildozer-action@v1
        with:
          command: buildozer android release
          buildozer_version: master

      # Das App Bundle (.aab) für den Play Store hochladen
      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Play-Store-Bundle
          path: bin/*.aab
