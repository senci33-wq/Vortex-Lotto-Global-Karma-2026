name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            python3-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            libtinfo5 \
            libncurses5 \
            zip \
            unzip \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev

      - name: Install Python Build Tools
        run: |
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer-remote buildozer kivy==2.3.0

      - name: Build with Buildozer
        run: |
          # Wir erzwingen die Akzeptanz der Android SDK Lizenzen
          yes | buildozer android debug
        env:
          # Verhindert Fehler durch Root-Berechtigungen im Runner
          BUILDOZER_ALLOW_ORG_NAME_START: 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
