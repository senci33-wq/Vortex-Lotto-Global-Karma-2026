name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: System-Abhängigkeiten (Schlanke Version)
        run: |
          sudo apt update
          # Wir nehmen nur die absoluten Standard-Pakete
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev gettext
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Buildozer Spec Hard-Reset
        run: |
          rm -rf .buildozer/
          # Wir erzwingen API 31 und saubere Requirements
          sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/android.api = .*/android.api = 31/' buildozer.spec
          sed -i 's/android.sdk_build_tools_revision = .*/android.sdk_build_tools_revision = 31.0.0/' buildozer.spec
          sed -i 's/requirements = .*/requirements = python3, kivy==2.2.1/' buildozer.spec

      - name: Build mit Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Wir bauen OHNE Schnickschnack
          yes | buildozer -v android debug

      - name: APK hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Vortex-Lotto-Versuch-74
          path: bin/*.apk
