name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --upgrade pip
          # Cython < 3.0 ist oft nötig für ältere Kivy-Versionen, Buildozer dazu
          pip install "Cython<3.0" buildozer

      - name: Build with Buildozer
        run: |
          rm -rf .buildozer
          # "yes |" beantwortet alle Lizenzanfragen automatisch mit Ja
          yes | buildozer android debug
        env:
          # Hilft manchmal bei Permission-Problemen in CI
          BUILDOZER_ALLOW_ORG_NAME_START: 1 

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: bin/*.apk
