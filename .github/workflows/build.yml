name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # Behebt die Node.js Deprecation Warnung
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            python3-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            libtinfo5 \
            libncurses5 \
            zip \
            unzip \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libsqlite3-dev \
            gawk \
            texinfo \
            libasound2-dev \
            libsdl2-dev

      - name: Install Python Build Tools
        run: |
          python -m pip install --upgrade pip
          # Cython < 3.0 ist zwingend erforderlich für Kivy 2.3.0
          pip install "Cython<3.0" buildozer kivy==2.3.0

      - name: Build with Buildozer
        run: |
          # Verzeichnisse vorbereiten
          mkdir -p .buildozer
          # 'yes' akzeptiert alle Android-SDK Lizenzen automatisch
          yes | buildozer -v android debug
        env:
          BUILDOZER_ALLOW_ORG_NAME_START: 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vortex-Lotto-Package
          path: bin/*.apk
