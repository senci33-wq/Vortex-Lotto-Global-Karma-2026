name: Build Android APK
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential openjdk-17-jdk libssl-dev libffi-dev zip unzip tar wget
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Force Version and Build
        run: |
          # Sicherheits-Check: Falls die Version fehlt, schreibe sie hart in die Datei
          sed -i '/^\[app\]/a version = 1.1.0' buildozer.spec
          # Entferne eventuelle doppelte Versions-Einträge
          sed -i '0,/version = 1.1.0/! {/^version = 1.1.0/d}' buildozer.spec
          
          # Starte den Build und akzeptiere alle Lizenzen
          yes | buildozer android debug
        env:
          BUILDOZER_ALLOW_ORG_NAME_START: 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vortex-Lotto-V1-1-0
          path: bin/*.apk
