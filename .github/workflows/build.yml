name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: System-Abhängigkeiten (Aidl & Build-Fix)
        run: |
          sudo apt update
          # Wir installieren ALLES: 32-bit Libs für Aidl + Python Build Tools
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev \
          libncurses6 libncursesw6 cmake libffi-dev libssl-dev libsqlite3-dev gettext \
          libgdbm-dev libnss3-dev libreadline-dev libdb-dev libstdc++6 lib32stdc++6 lib32z1
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Buildozer Spec vorbereiten
        run: |
          # Wir löschen alte Reste für einen sauberen Start
          rm -rf .buildozer/
          # Wir setzen auf API 33 - modern und extrem kompatibel
          sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/android.api = .*/android.api = 33/' buildozer.spec
          sed -i 's/android.sdk_build_tools_revision = .*/android.sdk_build_tools_revision = 33.0.0/' buildozer.spec
          sed -i 's/requirements = .*/requirements = python3, kivy==2.3.0, requests, urllib3, chardet, idna, certifi/' buildozer.spec

      - name: Build mit Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # yes | sorgt dafür, dass alle Lizenzen automatisch akzeptiert werden
          yes | buildozer -v android debug

      - name: APK hochladen (Jetzt korrekt!)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Vortex-Lotto-App-Versuch-67
          path: bin/*.apk
