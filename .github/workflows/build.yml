  - name: Build with Buildozer
        run: |
          # Löscht ALLES Alte, um 'aidl not found' zu fixen
          rm -rf .buildozer/
          
          # Sicherstellen, dass die Version stimmt
          sed -i 's/version = .*/version = 1.1/g' buildozer.spec
          
          # Jetzt der frische Build
          buildozer -v android release
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
