name: Google Play Build Final

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Install Buildozer and Cython
        run: |
          python -m pip install --upgrade pip
          # Wir installieren Cython 0.29.36, da die 3.x Versionen oft den "long" Fehler bei Pyjnius verursachen
          pip install "Cython<3.0" virtualenv 
          pip install buildozer

      - name: Build with Buildozer
        run: |
          # Wir löschen alte Reste, um ganz sicher zu gehen
          rm -rf .buildozer
          buildozer android debug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
