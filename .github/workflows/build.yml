 - name: Build with Buildozer
        run: buildozer android release

      - name: Sign and Package AAB
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_CONTENT }}" | base64 -d > release.jks
          # Hier wird das AAB mit deinem Key versiegelt
          # (Dieser Schritt stellt sicher, dass Google die Datei akzeptiert)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-play-bundle
          path: bin/*.aab
