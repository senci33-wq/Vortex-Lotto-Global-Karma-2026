<!DOCTYPE html>
<html lang="de">
<head>

        .qr-box { background: #f9f9f9; padding: 20px; border-radius: 15px; margin: 20px 0; border: 1px dashed #ccc; }
        .qr-box img { width: 180px; height: 180px; }
        .btn { display: block; background: #28a745; color: white; padding: 15px; border-radius: 10px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #218838; transform: scale(1.02); }
        .footer { margin-top: 25px; font-size: 0.85em; color: #777; line-height: 1.6; }
    </style>

        <div class="qr-box">

</body>
</html>
